[program:nextjs]
command=node /app/frontend/.next/standalone/server.js
directory=/app/frontend/.next/standalone
environment=PORT=3000,HOSTNAME=0.0.0.0,NODE_ENV=production
autostart=true
autorestart=true
stderr_logfile=/var/log/nextjs.err.log
stdout_logfile=/var/log/nextjs.out.log

[program:fastapi]
command=uvicorn server:app --host 0.0.0.0 --port 8000 --workers 1
directory=/app
environment=PORT=8000,GEMINI_API_KEY=%(ENV_GEMINI_API_KEY)s,TAVILY_API_KEY=%(ENV_TAVILY_API_KEY)s
autostart=true
autorestart=true
stderr_logfile=/var/log/fastapi.err.log
stdout_logfile=/var/log/fastapi.out.log

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/var/log/nginx.err.log
stdout_logfile=/var/log/nginx.out.log
